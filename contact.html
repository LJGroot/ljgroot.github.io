<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Contact | LJGroot.GitHub.io</title>

    <!-- Viewport for responsive behavior -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" type="image/jpg" href="images/favicon.ico">
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/polish.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrapper">
        <header>
            <h1 class="header-title">
                <a href="index.html" style="text-decoration: none; color: white;">Lennert J. Groot</a>
            </h1>
        </header>

        <!-- Menu button for small screens -->
        <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav">
            Menu
        </button>

        <!-- Nav with id so CSS + JS can target it -->
        <nav id="site-nav">
            <a href="index.html">Home</a>
            <a href="about-me.html">About Me</a>
            <a href="my-research.html">My Research</a>
            <a href="publications.html">Publications</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>

        <div class="container">
            <h2 class="section-header">Where to Find Me</h2>

            <!-- Row 1 -->
            <div class="button-container">
                <a class="contact-button" href="https://www.linkedin.com/in/lennert-groot/" target="_blank" rel="noopener noreferrer">
                    LinkedIn
                </a>
                <a class="contact-button" href="https://github.com/LJGroot" target="_blank" rel="noopener noreferrer">
                    GitHub
                </a>
            </div>

            <p> </p>

            <!-- Row 2 -->
            <div class="button-container">
                <a class="contact-button" href="https://orcid.org/0000-0002-8711-6086" target="_blank" rel="noopener noreferrer">
                    ORCID
                </a>
                <a class="contact-button" href="https://osf.io/zwbha/" target="_blank" rel="noopener noreferrer">
                    OSF
                </a>
            </div>

            <p> </p>

            <!-- Row 3 -->
            <div class="button-container">
                <a class="contact-button" href="https://www.uva.nl/en/profile/g/r/l.j.groot/l.j.groot.html" target="_blank" rel="noopener noreferrer">
                    UvA
                </a>
                <a class="contact-button" href="https://scholar.google.com/citations?user=sYpERdAAAAAJ&hl=nl&oi=ao" target="_blank" rel="noopener noreferrer">
                    Scholar
                </a>
            </div>

            <p> </p>

            <!-- Row 4 (single button, since total count is odd) -->
            <div class="button-container">
                <a class="contact-button" href="https://www.researchgate.net/profile/Lj-Groot" target="_blank" rel="noopener noreferrer">
                    ResearchGate
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>
            &copy; <span id="current-year"></span> L.J. Groot |
            <a href="https://ljgroot.github.io/" style="color: #6a11cb;">
                ljgroot.github.io
            </a>
        </p>
    </footer>

    <script>
      // Toggle the mobile menu (same pattern as other pages)
      const toggle = document.querySelector('.nav-toggle');
      const nav = document.getElementById('site-nav');

      if (toggle && nav) {
        toggle.addEventListener('click', () => {
          const isOpen = nav.classList.toggle('open');
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
      }

      // Set current year in footer
      const yearSpan = document.getElementById('current-year');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    </script>
</body>
</html>
